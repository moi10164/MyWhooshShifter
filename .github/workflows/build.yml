name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip && unzip -q gradle.zip && export PATH=$PATH:$(pwd)/gradle-8.2/bin && gradle wrapper --gradle-version 8.2 && chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v3
        with:
          name: MyWhoosh-Shifter
          path: app/build/outputs/apk/debug/app-debug.apk
